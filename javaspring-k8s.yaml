apiVersion: apps/v1
kind: Deployment
metadata:
  name: oaevents-backend
spec:
  selector:
    matchLabels:
      app: oaevents-backend
  template:
    metadata:
      labels:
        app: oaevents-backend
    spec:
      containers:
        - name: backend
          image: oaevents-backend:v1
          # La imagen es local, que no la busque en internet
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: oaevents-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
# Ingress del Backend
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    # Configuración de CORS para que Angular pueda hablar con la API
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://www.olivoarenaentradas.com"
spec:
  rules:
    - host: api.olivoarenaentradas.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080

